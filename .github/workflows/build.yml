name: Build and Lint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Lint the project
        run: npm run lint

      - name: Build the project
        run: npm run build

      # Non-mutating audit. We deliberately do not run `npm audit fix` in CI:
      # it would change the lockfile out from under us, hide the diff from
      # review, and let CI pass against an uncommitted dependency graph.
      # High/critical fixes come in through Dependabot PRs that update the
      # lockfile explicitly.
      - name: Audit dependencies
        run: npm audit --audit-level=high
